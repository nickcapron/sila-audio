<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SILA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0e14; --surface: #121823; --border: #233040;
      --accent: #34e3c4; --accent-2: #8b6cf0; --text: #d7e3e8; --text-dim: #6b7c8c;
      --step-off: #18222f; --step-on: #34e3c4; --step-hover: #243245;
      --aurora: linear-gradient(100deg, #34e3c4 0%, #5fd0e0 45%, #8b6cf0 100%);
    }
    body {
      background: radial-gradient(125% 80% at 50% -12%, #101a28 0%, var(--bg) 58%);
      color: var(--text); font-family: 'SF Mono','Consolas',monospace; font-size: 13px;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    header {
      display: flex; align-items: center; gap: 18px; padding: 10px 16px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .logo {
      font-weight: 700; font-size: 15px; letter-spacing: 4px; background: var(--aurora);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .meta { display: flex; align-items: center; gap: 8px; color: var(--text-dim); }
    .meta .val { color: var(--accent-2); font-variant-numeric: tabular-nums; min-width: 64px; }
    /* transport play indicator: dim when stopped, glowing accent when playing */
    #transport .dot {
      width: 9px; height: 9px; border-radius: 50%; background: var(--text-dim);
      transition: background .1s, box-shadow .1s;
    }
    #transport.playing { color: var(--accent); }
    #transport.playing .dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    /* active song-mode pattern badge */
    #active-pattern { color: var(--accent-2); font-weight: 700; letter-spacing: 1px; }
    input[type=range] { width: 120px; accent-color: var(--accent); }
    input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
    label { user-select: none; cursor: pointer; }

    .body { flex: 1; display: flex; min-height: 0; }
    main { flex: 1; overflow: auto; padding: 16px; }
    .track-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .ms { display: flex; gap: 3px; }
    .ms button {
      width: 22px; height: 22px; border: 1px solid var(--border); background: var(--surface);
      color: var(--text-dim); border-radius: 3px; cursor: pointer; font: inherit; font-size: 11px;
    }
    .ms button.on { color: #04110d; }
    .ms button.mute.on { background: #ffae57; border-color: #ffae57; }
    .ms button.solo.on { background: var(--accent); border-color: var(--accent); }
    .track-name { width: 84px; flex-shrink: 0; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .step-grid { display: flex; gap: 4px; }
    .step {
      width: 30px; height: 30px; border-radius: 4px; background: var(--step-off);
      border: 1px solid var(--border); cursor: pointer; transition: background .05s, box-shadow .05s;
      position: relative;
    }
    .step:hover { background: var(--step-hover); }
    .step.on { background: var(--step-on); border-color: var(--step-on); }
    .step.beat { border-color: #2e4258; }
    .step.playing { box-shadow: 0 0 0 2px var(--accent-2), 0 0 10px var(--accent-2); }
    .step.selected { outline: 2px solid var(--accent-2); outline-offset: 1px; }
    /* tiny dot when a step carries p-lock / non-default params */
    .step.locked::after {
      content: ""; position: absolute; right: 3px; top: 3px; width: 4px; height: 4px;
      border-radius: 50%; background: var(--accent-2);
    }

    /* Inspector */
    aside {
      width: 232px; flex-shrink: 0; border-left: 1px solid var(--border);
      background: var(--surface); padding: 14px 16px; overflow: auto;
    }
    aside h2 { font-size: 12px; letter-spacing: 2px; color: var(--accent); margin-bottom: 2px; }
    aside .sub { color: var(--text-dim); font-size: 11px; margin-bottom: 14px; }
    .field { margin-bottom: 12px; }
    .field .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
    .field label { color: var(--text-dim); font-size: 11px; }
    .field .fv { color: var(--accent-2); font-variant-numeric: tabular-nums; font-size: 12px; }
    .field input[type=range] { width: 100%; }
    .field select {
      width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border);
      border-radius: 3px; padding: 4px; font: inherit; font-size: 12px;
    }
    .field.phase5 label::after { content: " · Phase 5"; color: #4a5a6a; font-size: 9px; }
    #insp-empty { color: var(--text-dim); font-size: 12px; line-height: 1.6; }
    #insp-fields { display: none; }
    #status { padding: 6px 16px; border-top: 1px solid var(--border); color: var(--text-dim); font-size: 12px; flex-shrink: 0; }
    #status.ok { color: var(--accent); }

    /* per-track sample slot (opens the library browser) */
    .sample-slot {
      width: 130px; flex-shrink: 0; padding: 4px 8px; border: 1px solid var(--border);
      border-radius: 3px; background: var(--bg); color: var(--text-dim); cursor: pointer;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 11px;
    }
    .sample-slot:hover { border-color: var(--accent); color: var(--text); }
    .sample-slot.loaded { color: var(--accent); border-color: #2e4258; }

    /* library browser modal */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(4,8,12,.72); z-index: 1000;
      display: none; align-items: center; justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      width: min(680px, 92vw); height: min(78vh, 720px); background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column;
      overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    .modal-head { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--border); }
    .modal-head h2 { font-size: 12px; letter-spacing: 2px; color: var(--accent); }
    .modal-head input {
      flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 4px; padding: 6px 9px; font: inherit; font-size: 12px;
    }
    .modal-head .close { background: none; border: none; color: var(--text-dim); font-size: 20px; line-height: 1; cursor: pointer; }
    #lib-target { padding: 0 14px 8px; color: var(--text-dim); font-size: 11px; }
    .lib-tree { flex: 1; overflow: auto; padding: 6px; }
    .lib-pack > summary { cursor: pointer; padding: 5px 8px; color: var(--text); font-weight: 700; letter-spacing: .5px; }
    .lib-cat > summary { cursor: pointer; padding: 4px 8px 4px 22px; color: var(--text-dim); }
    .lib-cat > summary .count { color: var(--accent-2); margin-left: 6px; font-size: 10px; }
    summary { list-style: none; } summary::-webkit-details-marker { display: none; }
    summary::before { content: "▸ "; color: var(--text-dim); }
    details[open] > summary::before { content: "▾ "; }
    .lib-sample {
      padding: 4px 8px 4px 36px; color: var(--text-dim); cursor: pointer; font-size: 12px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-radius: 3px;
    }
    .lib-sample:hover { background: var(--step-hover); color: var(--accent); }
    .lib-empty { padding: 16px; color: var(--text-dim); text-align: center; }

    /* sample trimmer (layer-level start/end over a waveform) */
    #trimmer { display: none; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 12px; max-width: 760px; }
    #trimmer.visible { display: block; }
    .trim-head { color: var(--accent); font-size: 11px; letter-spacing: 2px; margin-bottom: 8px; }
    .trim-head span { color: var(--text-dim); letter-spacing: 0; margin-left: 8px; }
    .trim-wrap {
      position: relative; height: 92px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 4px; overflow: hidden; user-select: none;
    }
    .trim-wrap canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    .trim-region {
      position: absolute; top: 0; bottom: 0; background: rgba(52,227,196,.10);
      border-left: 1px solid var(--accent); border-right: 1px solid var(--accent); pointer-events: none;
    }
    .trim-handle { position: absolute; top: 0; bottom: 0; width: 12px; margin-left: -6px; cursor: ew-resize; z-index: 2; }
    .trim-handle::before { content: ""; position: absolute; left: 5px; top: 0; bottom: 0; width: 2px; background: var(--accent); }
    .trim-handle:hover::before { background: var(--accent-2); box-shadow: 0 0 8px var(--accent-2); }
    .trim-vals { display: flex; justify-content: space-between; color: var(--text-dim); font-size: 11px; margin-top: 5px; font-variant-numeric: tabular-nums; }
    .trim-vals span { color: var(--accent-2); }
  </style>
</head>
<body>
  <header>
    <span class="logo">SILA</span>
    <span class="meta" id="transport"><span class="dot"></span><span id="play-state">—</span></span>
    <span class="meta">BPM <span id="bpm" class="val" style="min-width:46px">—</span></span>
    <span class="meta">PPQ <span id="ppq" class="val">—</span></span>
    <span class="meta">Bar·Beat <span id="barbeat" class="val">—</span></span>
    <span class="meta">Swing <input type="range" id="swing" min="0" max="100" value="0"><span id="swing-pct" class="val" style="min-width:34px">0%</span></span>
    <span class="meta"><input type="checkbox" id="songMode"><label for="songMode">Song Mode</label></span>
    <span class="meta" id="active-pattern"></span>
  </header>

  <div class="body">
    <main>
      <div id="tracks"></div>

      <div id="trimmer">
        <div class="trim-head">SAMPLE TRIM <span id="trim-name"></span></div>
        <div class="trim-wrap" id="trim-wrap">
          <canvas id="trim-canvas"></canvas>
          <div class="trim-region" id="trim-region"></div>
          <div class="trim-handle" id="trim-start"></div>
          <div class="trim-handle" id="trim-end"></div>
        </div>
        <div class="trim-vals"><span id="trim-start-v">0%</span><span id="trim-end-v">100%</span></div>
      </div>
    </main>

    <aside>
      <h2 id="insp-title">INSPECTOR</h2>
      <div class="sub" id="insp-sub">left-click toggles · right-click inspects</div>

      <div id="insp-empty">Select a step to edit its velocity, probability, trig condition, micro-timing and sample slice.</div>

      <div id="insp-fields">
        <div class="field">
          <div class="row"><label>Velocity</label><span class="fv" id="iv-vel">100</span></div>
          <input type="range" id="i-vel" min="0" max="127" value="100">
        </div>
        <div class="field">
          <div class="row"><label>Probability</label><span class="fv" id="iv-prob">100%</span></div>
          <input type="range" id="i-prob" min="0" max="100" value="100">
        </div>
        <div class="field">
          <div class="row"><label>Trig condition</label></div>
          <select id="i-trig">
            <option value="always">Always</option>
            <option value="1:2">1:2</option>
            <option value="1:4">1:4</option>
            <option value="fill">Fill</option>
            <option value="not_fill">Not Fill</option>
          </select>
        </div>
        <div class="field">
          <div class="row"><label>Micro-timing</label><span class="fv" id="iv-mt">0</span></div>
          <input type="range" id="i-mt" min="-23" max="23" value="0">
        </div>
        <div class="field">
          <div class="row"><label>Sample start</label><span class="fv" id="iv-start">0%</span></div>
          <input type="range" id="i-start" min="0" max="100" value="0">
        </div>
        <div class="field">
          <div class="row"><label>Sample end</label><span class="fv" id="iv-end">100%</span></div>
          <input type="range" id="i-end" min="0" max="100" value="100">
        </div>
        <div class="field phase5">
          <div class="row"><label>Pitch</label><span class="fv" id="iv-pitch">0</span></div>
          <input type="range" id="i-pitch" min="-24" max="24" value="0">
        </div>
        <div class="field phase5">
          <div class="row"><label>Length</label></div>
          <select id="i-length">
            <option value="0.5">½ (1/32)</option>
            <option value="1" selected>1 (1/16)</option>
            <option value="2">2 (1/8)</option>
            <option value="3">3 (dotted)</option>
          </select>
        </div>
      </div>
    </aside>
  </div>

  <div id="status">connecting…</div>

  <div class="modal-backdrop" id="library-modal">
    <div class="modal">
      <div class="modal-head">
        <h2>LIBRARY</h2>
        <input id="lib-search" type="text" placeholder="search samples…" autocomplete="off" spellcheck="false">
        <button class="close" id="lib-close" title="close">×</button>
      </div>
      <div id="lib-target"></div>
      <div class="lib-tree" id="lib-tree"></div>
    </div>
  </div>

  <script type="module" src="./bridge.js"></script>
</body>
</html>
