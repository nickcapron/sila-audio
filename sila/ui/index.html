<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SILA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #e8632a;
      --accent-dim: #6b3015;
      --text: #d4d4d4;
      --text-dim: #666;
      --step-off: #222;
      --step-on: #e8632a;
      --step-hover: #333;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Consolas', monospace;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo { color: var(--accent); font-weight: 700; font-size: 15px; letter-spacing: 2px; }
    .bpm-display { display: flex; align-items: center; gap: 6px; }
    .bpm-display input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      width: 52px;
      padding: 3px 6px;
      border-radius: 3px;
    }
    .btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .btn:hover { background: #2a2a2a; }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn.primary:hover { background: #d4571f; }
    .btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
    .spacer { flex: 1; }

    /* ── Project switcher ───────────────────────────────────────── */
    .proj-menu-wrap { position: relative; }
    .proj-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      background: #1e1e1e;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      min-width: 180px;
      max-height: 260px;
      overflow-y: auto;
      z-index: 300;
      box-shadow: 0 6px 16px rgba(0,0,0,0.5);
      display: none;
    }
    .proj-dropdown.open { display: block; }
    .proj-item {
      padding: 6px 12px;
      font-size: 12px;
      font-family: inherit;
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
    }
    .proj-item:hover { background: #2a2a2a; color: var(--accent); }
    .proj-item.active { color: var(--accent); }
    .proj-item.new-proj { color: var(--text-dim); border-top: 1px solid var(--border); }

    /* ── Main layout ─────────────────────────────────────────── */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Track list ──────────────────────────────────────────── */
    #track-list { flex: 1; overflow: hidden; }

    .track-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .track-name {
      width: 80px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
    }
    .track-name:hover { color: var(--text); }
    .track-name-input {
      width: 80px;
      background: var(--surface);
      border: 1px solid var(--accent);
      color: var(--text);
      font-family: inherit;
      font-size: 11px;
      padding: 1px 4px;
      border-radius: 2px;
      outline: none;
    }
    .mute-btn {
      width: 22px; height: 22px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      font-size: 10px;
      color: var(--text-dim);
      display: flex; align-items: center; justify-content: center;
    }
    .mute-btn.muted { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
    .solo-btn {
      width: 22px; height: 22px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      font-size: 10px;
      color: var(--text-dim);
      display: flex; align-items: center; justify-content: center;
    }
    .solo-btn.soloed { background: #1a3a1a; color: #5f5; border-color: #5f5; }
    .dice-btn {
      width: 22px; height: 22px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-dim);
      display: flex; align-items: center; justify-content: center;
    }
    .dice-btn:hover { color: var(--text); border-color: #444; }
    .euclid-btn {
      width: 22px; height: 22px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      font-size: 10px;
      color: var(--text-dim);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
    }
    .euclid-btn:hover { color: var(--text); border-color: #444; }

    .sample-slot {
      width: 96px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 10px;
      padding: 3px 6px;
      border: 1px solid var(--border);
      border-radius: 3px;
      background: var(--surface);
      cursor: pointer;
      color: var(--text-dim);
    }
    .sample-slot:hover { border-color: #444; color: var(--text); }
    .sample-slot.loaded { color: var(--accent); border-color: var(--accent-dim); }

    .sample-picker {
      position: fixed;
      background: #1e1e1e;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      min-width: 180px;
      max-height: 220px;
      overflow-y: auto;
      z-index: 200;
      box-shadow: 0 6px 16px rgba(0,0,0,0.5);
    }
    .picker-item {
      padding: 6px 10px;
      font-size: 12px;
      font-family: inherit;
      color: var(--text);
      cursor: pointer;
    }
    .picker-item:hover { background: #2a2a2a; color: var(--accent); }
    .picker-empty {
      padding: 8px 10px;
      font-size: 11px;
      color: var(--text-dim);
      font-style: italic;
    }

    .step-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      flex: 1;
    }
    .step {
      width: 28px; height: 28px;
      background: var(--step-off);
      border: 1px solid #2e2e2e;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.05s;
      position: relative;
    }
    .step:hover { background: var(--step-hover); }
    .step.on { background: var(--track-col, var(--step-on)); border-color: var(--track-col, #ff7843); }
    .step.playing { outline: 2px solid #fff; outline-offset: -2px; }

    /* ── Library browser panel (left, collapsible) ──────────── */
    #lib-panel {
      width: 260px;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
      overflow: hidden;
      transition: width 0.18s ease;
      display: flex;
      flex-direction: column;
    }
    #lib-panel.collapsed { width: 0; border-right-width: 0; }
    #lib-panel-inner {
      width: 260px;
      height: 100%;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }
    .lib-search {
      padding: 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .lib-search input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 3px;
    }
    .lib-search input:focus { outline: none; border-color: #444; }
    #lib-tree {
      flex: 1;
      overflow-y: auto;
    }
    .lib-pack-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      user-select: none;
    }
    .lib-pack-header:hover { background: #222; }
    .lib-cat-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px 4px 20px;
      cursor: pointer;
      font-size: 11px;
      color: var(--text-dim);
      user-select: none;
    }
    .lib-cat-header:hover { color: var(--text); background: #1c1c1c; }
    .lib-caret {
      font-size: 8px;
      flex-shrink: 0;
      transition: transform 0.12s;
      display: inline-block;
    }
    .lib-caret.open { transform: rotate(90deg); }
    .lib-pack-body, .lib-cat-body { display: none; }
    .lib-pack-body.open, .lib-cat-body.open { display: block; }
    .lib-sample {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 6px 3px 34px;
      cursor: default;
    }
    .lib-sample:hover { background: #1e1e1e; }
    .lib-sample.hidden { display: none; }
    .lib-sample-name {
      flex: 1;
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
    }
    .lib-sample-size {
      font-size: 10px;
      color: var(--text-dim);
      flex-shrink: 0;
      min-width: 44px;
      text-align: right;
    }
    .lib-btn-prev, .lib-btn-add {
      width: 18px; height: 18px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text-dim);
      font-size: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-family: inherit;
      padding: 0;
      line-height: 1;
    }
    .lib-btn-prev:hover { color: var(--accent); border-color: var(--accent); }
    .lib-btn-add:hover { color: #66bb66; border-color: #66bb66; }
    /* ── Song mode timeline ─────────────────────────────────────── */
    #song-bar {
      border-top: 1px solid var(--border);
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      background: var(--surface);
    }
    .pattern-slot {
      width: 36px; height: 28px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      color: var(--text-dim);
      cursor: pointer;
      user-select: none;
      flex-direction: column;
      gap: 1px;
    }
    .pattern-slot:hover { border-color: #444; }
    .pattern-slot.saved { border-color: var(--accent-dim); color: var(--accent); }
    .pattern-slot.in-chain { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
    .pattern-slot.playing { background: var(--accent); color: #fff; }
    #active-pattern-label {
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--accent);
      font-weight: 600;
      padding: 2px 6px;
      border: 1px solid var(--accent-dim);
      border-radius: 3px;
      display: none;            /* hidden when song mode is off */
    }
    #active-pattern-label.visible { display: inline-block; }
    .song-toggle { font-size: 11px; }

    /* ── Step count selector ────────────────────────────���───────── */
    .step-count-sel {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: inherit;
      font-size: 10px;
      padding: 2px 3px;
      border-radius: 3px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .step-count-sel:hover { border-color: #444; }

    .lib-empty {
      padding: 16px 12px;
      font-size: 11px;
      color: var(--text-dim);
      font-style: italic;
    }

    /* ── Sidebar (inspector) ─────────────────────────────────── */
    #sidebar {
      width: 230px;
      border-left: 1px solid var(--border);
      overflow-y: auto;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    .insp-header {
      padding: 8px 12px 6px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .insp-mode {
      font-size: 10px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
    }
    .insp-submode {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 2px;
    }
    .insp-empty {
      padding: 24px 12px;
      font-size: 11px;
      color: var(--text-dim);
      font-style: italic;
      line-height: 1.6;
    }
    .insp-panel { padding: 10px 12px; }
    .inspector-section { margin-bottom: 14px; }
    .inspector-title {
      color: var(--text-dim);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .field { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; }
    .field label {
      color: var(--text-dim);
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .field input, .field select, .field textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      padding: 4px 6px;
      border-radius: 3px;
      width: 100%;
    }
    .field textarea { resize: vertical; height: 60px; }
    /* P-lock indicator dot */
    .plk {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.1s;
    }
    .plk.on { background: var(--accent); }

    /* ── Sample trimmer ─────────────────────────────────────── */
    .trimmer-wrap {
      position: relative;
      height: 60px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      overflow: hidden;
      cursor: crosshair;
      margin-bottom: 6px;
    }
    .trimmer-canvas { display: block; width: 100%; height: 100%; }
    .trimmer-handle {
      position: absolute;
      top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      cursor: ew-resize;
      z-index: 10;
    }
    .trimmer-region {
      position: absolute;
      top: 0; bottom: 0;
      background: rgba(232,99,42,0.12);
      pointer-events: none;
    }

    /* ── Performance mode ───────────────────────────────────── */
    body.perf-mode header > *:not(#btn-perf-exit) { display: none !important; }
    body.perf-mode #btn-perf-exit { display: flex !important; }
    body.perf-mode #lib-panel { display: none !important; }
    body.perf-mode #sidebar    { display: none !important; }
    body.perf-mode #song-bar   { display: none !important; }
    body.perf-mode #tracks-container { padding: 8px !important; }
    body.perf-mode .mute-btn, body.perf-mode .solo-btn,
    body.perf-mode .dice-btn,  body.perf-mode .euclid-btn,
    body.perf-mode .step-count-sel, body.perf-mode .sample-slot { display: none !important; }
    body.perf-mode .track-name { color: var(--text) !important; font-size: 12px !important; width: 60px; }
    body.perf-mode .step { width: 36px; height: 36px; }
    #btn-perf-exit {
      display: none;
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
      font-size: 11px;
      padding: 4px 8px;
    }

    /* ── Status bar ──────────────────────────────────────────── */
    footer {
      padding: 4px 16px;
      border-top: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 11px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<header>
  <button class="btn" id="btn-perf-exit" onclick="togglePerfMode()" title="Exit performance mode">✕ PERF</button>
  <button class="btn" id="btn-library" onclick="toggleBrowser()" title="Sample library">LIBRARY</button>
  <span class="logo">SILA</span>
  <div class="proj-menu-wrap">
    <button class="btn" id="btn-project" onclick="toggleProjectMenu()">PROJECT ▾</button>
    <div class="proj-dropdown" id="proj-dropdown"></div>
  </div>
  <div class="bpm-display">
    <span style="color:var(--text-dim)">BPM</span>
    <input type="number" id="bpm-input" value="120" min="20" max="300">
  </div>
  <div class="bpm-display">
    <span style="color:var(--text-dim)">SWING</span>
    <input type="range" id="swing-input" min="0" max="100" value="0" style="width:64px">
    <span id="swing-pct" style="color:var(--text-dim);font-size:11px;min-width:26px">0%</span>
  </div>
  <button class="btn primary" id="btn-play" onclick="togglePlay()">PLAY</button>
  <button class="btn" id="btn-fill" onclick="toggleFill()">FILL</button>
  <button class="btn" onclick="undo()">UNDO</button>
  <button class="btn" onclick="redo()">REDO</button>
  <div class="spacer"></div>
  <button class="btn" id="btn-metro" onclick="toggleMetronome()">METRO</button>
  <button class="btn" onclick="addTrack()">+ TRACK</button>
  <button class="btn" onclick="saveProject()">SAVE</button>
  <button class="btn primary" onclick="exportDigitakt()">EXPORT FOR DIGITAKT</button>
  <div id="midi-wrap" style="display:flex;align-items:center;gap:6px">
    <span id="midi-indicator" title="MIDI activity"
      style="width:10px;height:10px;border-radius:50%;background:#333;border:1px solid #444;flex-shrink:0;transition:background 0.15s"></span>
    <button class="btn" id="btn-midi-learn" onclick="toggleMidiLearn()" title="MIDI learn — select a track then click this and press a key">MIDI</button>
  </div>
</header>

<main>
  <div id="lib-panel" class="collapsed">
    <div id="lib-panel-inner">
      <div class="lib-search">
        <input type="text" id="lib-search" placeholder="Search library…" oninput="filterLibrary(this.value)">
      </div>
      <div id="lib-tree"><div class="lib-empty">Press LIBRARY to browse samples</div></div>
    </div>
  </div>

  <div id="track-list" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div id="tracks-container" style="flex:1;overflow-y:auto;padding:12px 16px"></div>
    <div id="song-bar">
      <button class="btn song-toggle" id="btn-song-mode" onclick="toggleSongMode()">SONG OFF</button>
      <span id="active-pattern-label"></span>
      <span style="color:var(--text-dim);font-size:10px">PATTERNS:</span>
      <div id="pattern-slots" style="display:flex;gap:4px"></div>
    </div>
  </div>

  <div id="sidebar">

    <!-- ── Inspector header (always visible) ──────────── -->
    <div class="insp-header">
      <div class="insp-mode" id="insp-mode">Nothing selected</div>
      <div class="insp-submode" id="insp-sub"></div>
    </div>

    <!-- ── Empty state ───────────────────────────────── -->
    <div class="insp-empty" id="insp-empty">
      Click a track name for track controls.<br>
      Click a step to edit that step.
    </div>

    <!-- ── STEP panel ────────────────────────────────── -->
    <div class="insp-panel" id="insp-step" style="display:none">
      <div class="inspector-section">
        <div class="inspector-title">Step parameters</div>
        <div class="field">
          <label>Velocity</label>
          <input type="range" id="step-vel" min="0" max="127" value="100">
        </div>
        <div class="field">
          <label>Pitch offset</label>
          <input type="range" id="step-pitch" min="-24" max="24" value="0">
        </div>
        <div class="field">
          <label>Probability %</label>
          <input type="range" id="step-prob" min="0" max="100" value="100">
        </div>
        <div class="field">
          <label>Trig condition</label>
          <select id="step-trig">
            <option value="always">Always</option>
            <option value="1:2">1:2</option>
            <option value="1:4">1:4</option>
            <option value="fill">Fill</option>
            <option value="not_fill">Not fill</option>
          </select>
        </div>
        <div class="field">
          <label>Step length</label>
          <select id="step-length">
            <option value="0.5">½ (1/32)</option>
            <option value="1.0" selected>1× (1/16)</option>
            <option value="2.0">2× (1/8)</option>
            <option value="3.0">3× (dotted)</option>
          </select>
        </div>
        <div class="field">
          <label>
            <span class="plk" id="plk-start" title="P-locked start"></span>
            Sample start
          </label>
          <input type="range" id="step-start" min="0" max="100" value="0">
        </div>
        <div class="field">
          <label>
            <span class="plk" id="plk-end" title="P-locked end"></span>
            Sample end
          </label>
          <input type="range" id="step-end" min="0" max="100" value="100">
        </div>
      </div>
    </div>

    <!-- ── TRACK panel ───────────────────────────────── -->
    <div class="insp-panel" id="insp-track" style="display:none">

      <!-- Sample trimmer (shown when track has a sample) -->
      <div id="trimmer-section" style="display:none">
        <div class="inspector-title">Sample trim</div>
        <div class="trimmer-wrap" id="trimmer-wrap">
          <canvas class="trimmer-canvas" id="trimmer-canvas"></canvas>
          <div class="trimmer-region" id="trimmer-region"></div>
          <div class="trimmer-handle" id="trimmer-start-handle" style="left:0%"></div>
          <div class="trimmer-handle" id="trimmer-end-handle"   style="left:100%"></div>
        </div>
      </div>

      <div class="inspector-section">
        <div class="inspector-title">Sound</div>
        <div class="field">
          <label>Volume</label>
          <input type="range" id="fx-volume" min="0" max="200" value="100">
        </div>
        <div class="field">
          <label>Pan</label>
          <input type="range" id="fx-pan" min="-100" max="100" value="0">
        </div>
        <div class="field">
          <label>Filter cutoff</label>
          <input type="range" id="fx-cutoff" min="0" max="100" value="100">
        </div>
        <div class="field">
          <label>Resonance</label>
          <input type="range" id="fx-resonance" min="0" max="100" value="0">
        </div>
      </div>

      <div class="inspector-section">
        <div class="inspector-title">Dynamics</div>
        <div class="field">
          <label>Humanize</label>
          <input type="range" id="track-humanize" min="0" max="100" value="0">
        </div>
      </div>

      <div class="inspector-section">
        <div class="inspector-title">LFO</div>
        <div class="field">
          <label>Shape</label>
          <select id="lfo-shape">
            <option value="sine">Sine</option>
            <option value="triangle">Triangle</option>
            <option value="square">Square</option>
            <option value="sawtooth">Sawtooth</option>
            <option value="random">Random</option>
          </select>
        </div>
        <div class="field">
          <label>Rate (Hz)</label>
          <input type="range" id="lfo-rate" min="1" max="200" value="10" step="1">
        </div>
        <div class="field">
          <label>Depth</label>
          <input type="range" id="lfo-depth" min="0" max="100" value="50">
        </div>
        <div class="field">
          <label>Destination</label>
          <select id="lfo-dest">
            <option value="volume">Volume</option>
            <option value="pan">Pan</option>
            <option value="filter_cutoff">Filter cutoff</option>
            <option value="filter_resonance">Resonance</option>
          </select>
        </div>
      </div>

      <div class="inspector-section">
        <div class="inspector-title">Notes</div>
        <div class="field">
          <textarea id="track-notes" placeholder="What is this track for?"></textarea>
        </div>
        <button class="btn" onclick="saveNotes()">Save notes</button>
      </div>

    </div><!-- end insp-track -->
  </div><!-- end sidebar -->
</main>

<footer id="status">Ready</footer>

<script src="app.js"></script>
</body>
</html>
